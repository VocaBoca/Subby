services:
  web:
    build:
      context: ../backend
    container_name: subby_web
    env_file:
      - ../.env
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app
  db:
    image: postgres:16
    container_name: subby_db
    env_file: ../.env
    ports:
      - "55432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  
  redis:
    image: redis:7
    container_name: subby_redis
    ports:
      - "6379:6379"

volumes:
  pgdata: